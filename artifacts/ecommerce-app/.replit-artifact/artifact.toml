kind = "web"
previewPath = "/"
title = "eCommerce Store"
version = "1.0.0"
id = "artifacts/ecommerce-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18331

[services.development]
run = "pnpm --filter @workspace/ecommerce-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ecommerce-app", "run", "build" ]
publicDir = "artifacts/ecommerce-app/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18331"
BASE_PATH = "/"
